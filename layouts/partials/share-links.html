{{- define "share-links" }}
<div class="share-buttons">
    <style>
        .share-buttons {
            margin: 2rem 0;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .share-btn-twitter {
            background-color: #000;
            color: #fff;
            border-color: #000;
        }
        .share-btn-linkedin {
            background-color: #0077b5;
            color: #fff;
            border-color: #0077b5;
        }
        .share-btn-email {
            background-color: #6b7280;
            color: #fff;
            border-color: #6b7280;
        }
        .share-btn-link {
            background-color: transparent;
            color: var(--primary);
            border-color: var(--border);
        }
        .share-btn-link.copy-btn {
            cursor: pointer;
        }
        .share-btn-link.copy-btn.copied {
            background-color: var(--primary);
            color: #fff;
        }
        .share-icon {
            width: 16px;
            height: 16px;
        }
    </style>

    <div class="share-buttons">
        <!-- Twitter/X -->
        <a href="https://twitter.com/intent/tweet?text={{ .Title }}&url={{ .Permalink }}&hashtags=AI,MachineLearning" 
           class="share-btn share-btn-twitter"
           target="_blank"
           rel="noopener noreferrer">
            <svg class="share-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            Share on X
        </a>

        <!-- LinkedIn -->
        <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink }}" 
           class="share-btn share-btn-linkedin"
           target="_blank"
           rel="noopener noreferrer">
            <svg class="share-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            LinkedIn
        </a>

        <!-- Email -->
        <a href="mailto:?subject={{ .Title }}&body=Check out this article: {{ .Permalink }}" 
           class="share-btn share-btn-email">
            <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
            </svg>
            Email
        </a>

        <!-- Copy Link -->
        <button class="share-btn share-btn-link copy-btn" 
                onclick="copyArticleLink(this)"
                data-url="{{ .Permalink }}">
            <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>Copy Link</span>
        </button>
    </div>

    <script>
        function copyArticleLink(button) {
            const url = button.getAttribute('data-url');
            navigator.clipboard.writeText(url).then(() => {
                button.classList.add('copied');
                const span = button.querySelector('span');
                span.textContent = 'Copied!';
                
                setTimeout(() => {
                    button.classList.remove('copied');
                    span.textContent = 'Copy Link';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }
    </script>
</div>
{{- end }}
