{{- define "share-links" }}
<div class="share-buttons">
    <style>
        .share-buttons {
            margin: 2rem 0;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .share-btn-twitter {
            background-color: #000;
            color: #fff;
            border-color: #000;
        }
        .share-btn-linkedin {
            background-color: #0077b5;
            color: #fff;
            border-color: #0077b5;
        }
        .share-btn-email {
            background-color: #6b7280;
            color: #fff;
            border-color: #6b7280;
        }
        .share-btn-wechat {
            background-color: #07c160;
            color: #fff;
            border-color: #07c160;
        }
        .share-btn-link {
            background-color: transparent;
            color: var(--primary);
            border-color: var(--border);
        }
        .share-btn-link.copy-btn {
            cursor: pointer;
        }
        .share-btn-link.copy-btn.copied {
            background-color: var(--primary);
            color: #fff;
        }
        .share-icon {
            width: 16px;
            height: 16px;
        }
    </style>

    <div class="share-buttons">
        <!-- Twitter/X -->
        <a href="https://twitter.com/intent/tweet?text={{ .Title }}&url={{ .Permalink }}&hashtags=AI,MachineLearning" 
           class="share-btn share-btn-twitter"
           target="_blank"
           rel="noopener noreferrer">
            <svg class="share-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            Share on X
        </a>

        <!-- LinkedIn -->
        <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink }}" 
           class="share-btn share-btn-linkedin"
           target="_blank"
           rel="noopener noreferrer">
            <svg class="share-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            LinkedIn
        </a>

        <!-- Email -->
        <a href="mailto:?subject={{ .Title }}&body=Check out this article: {{ .Permalink }}" 
           class="share-btn share-btn-email">
            <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
            </svg>
            Email
        </a>

        <!-- WeChat Copy Full Article -->
        <button class="share-btn share-btn-wechat" 
                onclick="copyArticleForWechat(this)">
            <svg class="share-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.045c.134 0 .241-.108.241-.245 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89c-.135-.01-.27-.027-.407-.03zm-2.53 3.274c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/>
            </svg>
            <span>微信转发</span>
        </button>

        <!-- Copy Link -->
        <button class="share-btn share-btn-link copy-btn" 
                onclick="copyArticleLink(this)"
                data-url="{{ .Permalink }}">
            <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>Copy Link</span>
        </button>
    </div>

    <script>
        function copyArticleLink(button) {
            const url = button.getAttribute('data-url');
            navigator.clipboard.writeText(url).then(() => {
                button.classList.add('copied');
                const span = button.querySelector('span');
                span.textContent = 'Copied!';
                
                setTimeout(() => {
                    button.classList.remove('copied');
                    span.textContent = 'Copy Link';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        function copyArticleForWechat(button) {
            const title = document.querySelector('h1')?.textContent || document.title;
            const contentDiv = document.querySelector('.post-content, .content, article');
            const content = contentDiv ? contentDiv.innerText : document.body.innerText;
            const url = window.location.href;
            
            const wechatText = `${title}

${content}

---
原文链接：${url}
作者：Alex Lobster`;

            navigator.clipboard.writeText(wechatText).then(() => {
                const span = button.querySelector('span');
                span.textContent = '已复制!';
                button.style.backgroundColor = '#e24329';
                
                setTimeout(() => {
                    span.textContent = '微信转发';
                    button.style.backgroundColor = '#07c160';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('复制失败，请手动复制');
            });
        }
    </script>
</div>
{{- end }}
