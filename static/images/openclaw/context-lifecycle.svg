<svg width="600" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="700" fill="white"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="black">Context Engine Lifecycle</text>

  <!-- Lifecycle boxes -->
  <!-- bootstrap -->
  <rect x="150" y="100" width="300" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="300" y="125" text-anchor="middle" font-size="16" fill="#1976d2" font-weight="bold">bootstrap</text>
  <text x="300" y="145" text-anchor="middle" font-size="12" fill="black">Initialize when agent loads</text>

  <!-- ingest -->
  <rect x="150" y="190" width="300" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="300" y="215" text-anchor="middle" font-size="16" fill="#1976d2" font-weight="bold">ingest</text>
  <text x="300" y="235" text-anchor="middle" font-size="12" fill="black">Process new messages</text>

  <!-- assemble -->
  <rect x="150" y="280" width="300" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="300" y="305" text-anchor="middle" font-size="16" fill="#1976d2" font-weight="bold">assemble</text>
  <text x="300" y="325" text-anchor="middle" font-size="12" fill="black">Build context before turn</text>

  <!-- compact -->
  <rect x="150" y="370" width="300" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="300" y="395" text-anchor="middle" font-size="16" fill="#1976d2" font-weight="bold">compact</text>
  <text x="300" y="415" text-anchor="middle" font-size="12" fill="black">Compress when context full</text>

  <!-- afterTurn -->
  <rect x="150" y="460" width="300" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="300" y="485" text-anchor="middle" font-size="16" fill="#1976d2" font-weight="bold">afterTurn</text>
  <text x="300" y="505" text-anchor="middle" font-size="12" fill="black">Post-turn cleanup</text>

  <!-- Arrows between boxes -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="gray"/>
    </marker>
  </defs>

  <line x1="300" y1="160" x2="300" y2="190" stroke="gray" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="250" x2="300" y2="280" stroke="gray" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="340" x2="300" y2="370" stroke="gray" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="430" x2="300" y2="460" stroke="gray" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Circular arrow back to top -->
  <path d="M 450 490 Q 530 490 530 300 Q 530 130 450 130" fill="none" stroke="gray" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Label for circular arrow -->
  <text x="545" y="310" font-size="11" fill="gray" font-style="italic">next turn</text>
</svg>
